<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aadav's 6th Birthday!</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
background: #1a6fc4;
display: flex;
justify-content: center;
align-items: center;
min-height: 100vh;
font-family: 'Nunito', sans-serif;
padding: 20px;
}

.circle-img {
  width: 100px;      /* Set equal width and height */
  height: 100px;     /* Set equal width and height */
  border-radius: 50%; /* This creates the circular shape */
}

.invite-wrapper {
position: relative;
width: 480px;
animation: popIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
}

@keyframes popIn {
0% { transform: scale(0.5); opacity: 0; }
100% { transform: scale(1); opacity: 1; }
}

/* Outer zigzag orange border */
.zigzag-outer {
background: #f47920;
padding: 18px;
clip-path: polygon(
0% 3%, 3% 0%, 6% 3%, 9% 0%, 12% 3%, 15% 0%, 18% 3%, 21% 0%, 24% 3%, 27% 0%, 30% 3%, 33% 0%, 36% 3%, 39% 0%, 42% 3%, 45% 0%, 48% 3%, 51% 0%, 54% 3%, 57% 0%, 60% 3%, 63% 0%, 66% 3%, 69% 0%, 72% 3%, 75% 0%, 78% 3%, 81% 0%, 84% 3%, 87% 0%, 90% 3%, 93% 0%, 96% 3%, 99% 0%, 100% 3%,
100% 97%, 99% 100%, 96% 97%, 93% 100%, 90% 97%, 87% 100%, 84% 97%, 81% 100%, 78% 97%, 75% 100%, 72% 97%, 69% 100%, 66% 97%, 63% 100%, 60% 97%, 57% 100%, 54% 97%, 51% 100%, 48% 97%, 45% 100%, 42% 97%, 39% 100%, 36% 97%, 33% 100%, 30% 97%, 27% 100%, 24% 97%, 21% 100%, 18% 97%, 15% 100%, 12% 97%, 9% 100%, 6% 97%, 3% 100%, 0% 97%
);
position: relative;
}

/* Striped blue background card */
.card {
background: white;
border-radius: 4px;
overflow: hidden;
position: relative;
}

.stripes-bg {
position: absolute;
top: 0; left: 0; right: 0; bottom: 0;
background: repeating-linear-gradient(
90deg,
#cde4f7 0px, #cde4f7 30px,
white 30px, white 60px
);
opacity: 0.5;
z-index: 0;
}

.card-content {
position: relative;
z-index: 1;
padding: 30px 30px 20px 30px;
text-align: center;
}

/* Top tagline */
.tagline {
font-family: 'Fredoka One', cursive;
font-size: 15px;
color: #1a6fc4;
letter-spacing: 1px;
text-transform: uppercase;
margin-bottom: 8px;
animation: fadeDown 0.6s ease 0.3s both;
}

/* Glasses icon */
.glasses {
font-size: 28px;
margin-bottom: 6px;
animation: fadeDown 0.6s ease 0.4s both;
}

@keyframes fadeDown {
from { opacity: 0; transform: translateY(-15px); }
to { opacity: 1; transform: translateY(0); }
}

/* Name */
.name {
font-family: 'Fredoka One', cursive;
font-size: 72px;
line-height: 1;
color: #1a6fc4;
-webkit-text-stroke: 3px #f47920;
text-shadow: 4px 4px 0px #f47920;
margin-bottom: 4px;
animation: fadeDown 0.6s ease 0.5s both;
}

.is-turning {
font-family: 'Fredoka One', cursive;
font-size: 22px;
color: #333;
margin-bottom: 0px;
animation: fadeDown 0.6s ease 0.6s both;
}

/* Number 6 */
.number {
font-family: 'Fredoka One', cursive;
font-size: 110px;
line-height: 1;
color: #f47920;
-webkit-text-stroke: 4px #222;
text-shadow: 5px 5px 0px #222;
margin: -10px 0 0px 0;
display: inline-block;
animation: bounce 1s ease 1s both;
}

@keyframes bounce {
0% { transform: scale(0); opacity: 0; }
60% { transform: scale(1.2); opacity: 1; }
80% { transform: scale(0.95); }
100% { transform: scale(1); }
}

/* Blippi character area */
.blippi-section {
display: flex;
align-items: flex-end;
justify-content: center;
gap: 20px;
margin: 0px 0 15px 0;
}

.blippi-emoji {
font-size: 80px;
animation: wave 2s ease-in-out infinite;
transform-origin: bottom center;
}

@keyframes wave {
0%, 100% { transform: rotate(-5deg); }
50% { transform: rotate(5deg); }
}

/* Subtitle */
.subtitle {
font-family: 'Fredoka One', cursive;
font-size: 18px;
color: #1a6fc4;
margin-bottom: 20px;
animation: fadeUp 0.6s ease 0.9s both;
}

@keyframes fadeUp {
from { opacity: 0; transform: translateY(15px); }
to { opacity: 1; transform: translateY(0); }
}

/* Divider */
.bow-divider {
display: flex;
align-items: center;
gap: 10px;
justify-content: center;
margin-bottom: 18px;
}

.bow-divider::before,
.bow-divider::after {
content: '';
flex: 1;
height: 2px;
background: #f47920;
}

.bow {
font-size: 20px;
}

/* Details section */
.details {
display: flex;
justify-content: center;
gap: 30px;
margin-bottom: 18px;
animation: fadeUp 0.6s ease 1s both;
}

.detail-block {
text-align: center;
}

.detail-label {
font-size: 10px;
text-transform: uppercase;
letter-spacing: 1.5px;
color: #999;
font-weight: 800;
margin-bottom: 4px;
}

.detail-value {
font-family: 'Fredoka One', cursive;
font-size: 16px;
color: #1a6fc4;
line-height: 1.3;
}

.detail-divider {
width: 2px;
background: #f47920;
border-radius: 2px;
}

/* Location */
.location-block {
background: linear-gradient(135deg, #1a6fc4, #2589e8);
border-radius: 12px;
padding: 12px 20px;
margin-bottom: 16px;
animation: fadeUp 0.6s ease 1.1s both;
}

.location-block .detail-label {
color: rgba(255,255,255,0.7);
}

.location-block .detail-value {
color: white;
font-size: 18px;
}

/* RSVP */
.rsvp-section {
background: #fff8e1;
border: 2px dashed #f47920;
border-radius: 12px;
padding: 12px 16px;
animation: fadeUp 0.6s ease 1.2s both;
}

.rsvp-title {
font-family: 'Fredoka One', cursive;
font-size: 14px;
color: #f47920;
text-transform: uppercase;
letter-spacing: 1px;
margin-bottom: 6px;
}

.rsvp-names {
font-size: 13px;
font-weight: 800;
color: #333;
margin-bottom: 4px;
}

.rsvp-phones {
font-size: 13px;
color: #1a6fc4;
font-weight: 700;
}

/* Bottom stars decoration */
.stars {
display: flex;
justify-content: center;
gap: 8px;
margin-top: 14px;
font-size: 18px;
animation: fadeUp 0.6s ease 1.3s both;
}

.star {
animation: twinkle 1.5s ease-in-out infinite;
}

.star:nth-child(2) { animation-delay: 0.3s; }
.star:nth-child(3) { animation-delay: 0.6s; }
.star:nth-child(4) { animation-delay: 0.9s; }
.star:nth-child(5) { animation-delay: 1.2s; }

@keyframes twinkle {
0%, 100% { transform: scale(1); opacity: 1; }
50% { transform: scale(1.3); opacity: 0.7; }
}

/* Confetti */
.confetti-container {
position: fixed;
top: 0; left: 0;
width: 100%; height: 100%;
pointer-events: none;
z-index: 999;
overflow: hidden;
}

.confetti-piece {
position: absolute;
width: 10px;
height: 10px;
top: -10px;
animation: confettiFall linear infinite;
}

@keyframes confettiFall {
0% { transform: translateY(-10px) rotate(0deg); opacity: 1; }
100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
}
</style>
</head>
<body>

<div class="confetti-container" id="confetti"></div>

<div class="invite-wrapper">
<div class="zigzag-outer">
<div class="card">
<div class="stripes-bg"></div>
<div class="card-content">

<div class="glasses">🕶️</div>
<div class="tagline">Excuse me… Did someone say Birthday?</div>

<div class="name">Aadav</div>
<div class="is-turning">is turning</div>
<div class="number">6</div>

<div class="blippi-section">
<div class="blippi-emoji">🎉</div>
<div style="font-size:90px; animation: wave 2s ease-in-out infinite 0.5s;"><img src="IMG_8203.jpg" width="100" height="150"></div>
<div class="blippi-emoji" style="animation-delay:0.5s;">🎈</div>
</div>

<div class="subtitle">Join us for a Blippi-tastic Birthday Bash!</div>

<div class="bow-divider">
<span class="bow">🎀</span>
</div>

<div class="details">
<div class="detail-block">
<div class="detail-label">📅 Date</div>
<div class="detail-value">Saturday<br>May 9, 2026</div>
</div>
<div class="detail-divider"></div>
<div class="detail-block">
<div class="detail-label">⏰ Time</div>
<div class="detail-value">12:00 - 1:45 PM<br>&nbsp;</div>
</div>
</div>

<div class="location-block">
<div class="detail-label">📍 Location</div>
<div class="detail-value">Funmax, Simsbury</div>
<div class="detail-value">532 Bushy Hill Rd, Simsbury, CT 06070</div>
</div>

<div class="rsvp-section">
<div class="rsvp-title">📞 RSVP</div>
<div class="rsvp-names">Kripa or Rohit</div>
<div class="rsvp-phones">860-970-3551 &nbsp;|&nbsp; 860-913-5809</div>
</div>

<div class="stars">
<span class="star">⭐</span>
<span class="star">🌟</span>
<span class="star">⭐</span>
<span class="star">🌟</span>
<span class="star">⭐</span>
</div>

</div>
</div>
</div>
</div>

<script>
// Generate confetti
const colors = ['#f47920', '#1a6fc4', '#FFD700', '#ff6b6b', '#4ecdc4', '#ffffff'];
const shapes = ['■', '●', '▲', '★'];
const container = document.getElementById('confetti');

for (let i = 0; i < 60; i++) {
const piece = document.createElement('div');
piece.classList.add('confetti-piece');
piece.style.left = Math.random() * 100 + 'vw';
piece.style.color = colors[Math.floor(Math.random() * colors.length)];
piece.style.fontSize = (Math.random() * 10 + 8) + 'px';
piece.style.animationDuration = (Math.random() * 4 + 3) + 's';
piece.style.animationDelay = (Math.random() * 5) + 's';
piece.style.opacity = Math.random();
piece.innerHTML = shapes[Math.floor(Math.random() * shapes.length)];
container.appendChild(piece);
}
</script>

</body>
</html>
